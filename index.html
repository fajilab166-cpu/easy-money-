<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Secure Earn Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0f0f0f; --card: #1e1e1e; --accent: #00d2ff; --text: #ffffff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; overflow-x: hidden; }
        .header-stats { display: flex; justify-content: space-around; background: var(--card); padding: 15px; border-bottom: 2px solid var(--accent); }
        .stat-item { text-align: center; font-size: 12px; }
        .stat-item span { display: block; font-size: 16px; font-weight: bold; color: var(--accent); }
        
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #1a1a1a; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; }
        .nav-btn { cursor: pointer; opacity: 0.6; transition: 0.3s; font-size: 11px; text-align: center; }
        .nav-btn.active { opacity: 1; color: var(--accent); }
        
        .screen { display: none; padding: 20px; animation: fadeIn 0.5s; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .btn { background: var(--accent); color: #000; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; margin: 10px 0; }
        .list-box { background: var(--card); padding: 15px; border-radius: 10px; margin-top: 10px; font-size: 14px; }
        .flex { display: flex; justify-content: space-between; margin-bottom: 8px; }
    </style>
</head>
<body>

            </div>
            <button class="btn" style="background: linear-gradient(to right, #00d2ff, #3a7bd5);" onclick="watchAd()">🚀 WATCH ADS & EARN</button>

        <div id="top" class="screen">

                <div class="list-box"><div class="flex"><span>+88019***21</span> <span>$5.00 (Success)</span></div></div>
            </div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-btn active" onclick="changeTab('home', this)">🏠<br>Home</div>
        <div class="nav-btn" onclick="changeTab('top', this)">🏆<br>Leaderboard</div>
        <div class="nav-btn" onclick="changeTab('history', this)">📜<br>History</div>
    </div>

    function changeTab(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
